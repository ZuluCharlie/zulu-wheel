<div zuluMainStyle class="message-container d-flex flex-column justify-content-start">
  @if (!isConnected) {
    <zulu-button (buttonClick)="connectToTwitch()" icon="twitch" backgroundOverride="#6441a5"
      textOverride="#ffffff">
      Connect to Twitch
    </zulu-button>
  }
  @for (message of allMessages; track message) {
    <zulu-twitch-message [message]="message"></zulu-twitch-message>
  }
</div>
