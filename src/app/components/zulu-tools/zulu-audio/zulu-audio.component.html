<ng-container>
  @if (label) {
    <div>{{label}}</div>
  }
  <div class="d-flex align-items-center">
    @if (model.soundPath) {
      <audio #audio [src]="model.soundPath" [volume]="model.volume" [muted]="model.muted"
      (ended)="stopSound()"></audio>
    }
    <zulu-button (buttonClick)="onOpenFilePicker()">Choose File</zulu-button>
    @if (model.soundPath) {
      <zulu-slider class="flex-grow-1 m-2" label="Volume" [min]="0" [max]="1" [step]="0.01"
        [model]="model.volume" (inputChange)="onVolumeChanged($event)" />
    }
    @if (model.soundPath) {
<zulu-button [isSecondary]="true" (buttonClick)="toggleMute()" [icon]="model.muted
                ? 'mute' : 'audio'"></zulu-button>
    }
    @if (!isPlaying && model.soundPath) {
      <zulu-button [isSecondary]="true" (buttonClick)="playSound()"
      icon="play"></zulu-button>
    }
    @if (isPlaying) {
      <zulu-button [isSecondary]="true" (buttonClick)="stopSound()" icon="stop"></zulu-button>
    }
  </div>
</ng-container>
