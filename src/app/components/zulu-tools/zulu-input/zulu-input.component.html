<div class="form-group d-flex flex-column justify-content-center">
  @if (label) {
    <label zuluMainStyle>{{label}}</label>
  }
  <input #input [type]="type" [(ngModel)]="model" class="form-control" [placeholder]="placeholder"
    (ngModelChange)="onInputChange($event)" zuluInputStyle cursor="text">
    @if (small) {
      <small class="form-text text-muted">{{small}}</small>
    }
  </div>
