<div class="d-flex flex-column justify-content-center">
  @if (label) {
    <label zuluMainStyle>
      {{label}}
    </label>
  }
  <select [disabled]="disabled" class="form-select" [(ngModel)]="model" (ngModelChange)="onInputChange($event)" zuluInputStyle cursor="pointer"
    [ngStyle]="{ 'background-image': checkedImageUrl}">
    @for (option of options; track option) {
      <option [ngValue]="option.value" [disabled]="option.disabled" [title]="option.tooltip ?? ''">{{option.label}}</option>
    }
  </select>
  @if (small) {
    <small zuluMainStyle>{{small}}</small>
  }
</div>
